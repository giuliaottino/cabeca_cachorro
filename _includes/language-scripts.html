<script>
(function () {
  if (window.__TSIINO_I18N_LOADER__) return;
  window.__TSIINO_I18N_LOADER__ = true;

  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      var s = document.createElement("script");
      s.src = src;
      s.async = false;
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  async function loadI18n() {
    var prefixes = ["./", "../", "../../", "../../../", "/"];
    var lastError = null;

    for (var i = 0; i < prefixes.length; i++) {
      var p = prefixes[i];
      try {
        await loadScript(p + "js/translations.js");
        await loadScript(p + "js/language.js");
        return;
      } catch (err) {
        lastError = err;
      }
    }

    console.warn("Não foi possível carregar os scripts de tradução.", lastError);
  }

  loadI18n();
})();
</script>
